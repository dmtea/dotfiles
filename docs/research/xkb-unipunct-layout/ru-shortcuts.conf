# Ctrl→Latin mappings for Russian layout in kitty
#
# Problem: on Russian layout, Ctrl+C sends Ctrl+Cyrillic_es instead of Ctrl+c.
# Terminal doesn't recognize it as SIGINT. Kitty shortcuts (Ctrl+Shift+*) also break.
#
# Solution:
#   - Single Ctrl+key → send_text (terminal control characters: SIGINT, EOF, etc.)
#   - Ctrl+Shift+key → kitty actions (copy, paste, new tab, etc.)
#
# QWERTY→ЙЦУКЕН:
#   q=й w=ц e=у r=к t=е y=н u=г i=ш o=щ p=з [=х ]=ъ
#   a=ф s=ы d=в f=а g=п h=р j=о k=л l=д ;=ж '=э
#   z=я x=ч c=с v=м b=и n=т m=ь ,=б .=ю

# ============================================
# Ctrl+key → terminal control characters (send_text)
# These pass through to the shell/child process as if Latin layout was active.
# ============================================

# Ctrl+C (SIGINT) — most important!
map ctrl+с send_text all \x03
# Ctrl+D (EOF / exit)
map ctrl+в send_text all \x04
# Ctrl+Z (suspend)
map ctrl+я send_text all \x1a
# Ctrl+L (clear screen)
map ctrl+д send_text all \x0c
# Ctrl+U (kill line)
map ctrl+г send_text all \x15
# Ctrl+W (delete word back)
map ctrl+ц send_text all \x17
# Ctrl+R (reverse search)
map ctrl+к send_text all \x12
# Ctrl+A (beginning of line)
map ctrl+ф send_text all \x01
# Ctrl+E (end of line)
map ctrl+у send_text all \x05
# Ctrl+P (history back)
map ctrl+з send_text all \x10
# Ctrl+N (history forward)
map ctrl+т send_text all \x0e
# Ctrl+B (cursor left)
map ctrl+и send_text all \x02
# Ctrl+F (cursor right)
map ctrl+а send_text all \x06
# Ctrl+H (backspace)
map ctrl+р send_text all \x08
# Ctrl+T (transpose chars)
map ctrl+е send_text all \x14
# Ctrl+K (kill to end of line)
map ctrl+л send_text all \x0b
# Ctrl+O (operate-and-get-next)
map ctrl+щ send_text all \x0f
# Ctrl+J (newline)
map ctrl+о send_text all \x0a
# Ctrl+M (carriage return)
map ctrl+ь send_text all \x0d
# Ctrl+I (tab)
map ctrl+ш send_text all \x09
# Ctrl+[ (escape)
map ctrl+х send_text all \x1b
# Ctrl+G (bell / cancel)
map ctrl+п send_text all \x07
# Ctrl+S (stop output)
map ctrl+ы send_text all \x13
# Ctrl+Q (start output)
map ctrl+й send_text all \x11
# Ctrl+V (literal next)
map ctrl+м send_text all \x16
# Ctrl+\ (quit)
map ctrl+\\ send_text all \x1c
# Ctrl+X (shell: usually unused, readline uses it)
map ctrl+ч send_text all \x18
# Ctrl+] (shell: unused mostly)
map ctrl+ъ send_text all \x1d
# Ctrl+^ (shell: SIGQUIT on some systems)
map ctrl+6 send_text all \x1e

# ============================================
# Ctrl+Shift+key → kitty actions
# These are kitty's own shortcuts, not terminal control characters.
# ============================================

# Clipboard
map ctrl+shift+с copy_to_clipboard
map ctrl+shift+м paste_from_clipboard

# Tabs
map ctrl+shift+т new_tab_with_cwd
map ctrl+shift+ц close_tab

# Scrolling
map ctrl+shift+у scroll_page_up
map ctrl+shift+а scroll_page_down
map ctrl+shift+ь scroll_line_up
map ctrl+shift+и scroll_line_down
map ctrl+shift+ф scroll_home
map ctrl+shift+в scroll_end

# Font size
map ctrl+shift+ы decrease_font_size
map ctrl+shift+ж increase_font_size
map ctrl+shift+э restore_font_size

# Window/layout
map ctrl+shift+enter launch --location=vsplit
map ctrl+shift+б next_layout

# Search
map ctrl+shift+ы show_scrollback

# Misc
map ctrl+shift+й show_key
map ctrl+shift+е edit_config_file
